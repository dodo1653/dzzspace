name: Build release artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx --yes electron-vite build
      - run: npx --yes electron-builder --win --config.win.target=nsis
      - run: gh release upload ${{ github.ref_name }} "./dist_electron/dzzspace Setup 1.1.0.exe#dzzspace-Setup-1.1.0.exe" "./dist_electron/dzzspace Setup 1.1.0.exe.blockmap" "./dist_electron/latest.yml"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --mac --config.mac.target=zip
      - run: gh release upload ${{ github.ref_name }} "./dist_electron/dzzspace-1.1.0-mac.zip#dzzspace-darwin-x64.zip" "./dist_electron/latest-mac.yml"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --linux --config.linux.target=AppImage
      - run: gh release upload ${{ github.ref_name }} "./dist_electron/dzzspace-1.1.0.AppImage#dzzspace-linux-x64.AppImage" "./dist_electron/latest-linux.yml"
