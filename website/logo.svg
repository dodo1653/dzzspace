<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#0c0c12"/>
      <stop offset="100%" stop-color="#0c0c12"/>
    </linearGradient>
    <linearGradient id="glow" x1="128" y1="0" x2="128" y2="256">
      <stop offset="0%" stop-color="rgba(212,163,115,0.06)"/>
      <stop offset="50%" stop-color="rgba(212,163,115,0.02)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#bg)" rx="48"/>

  <!-- Monitor body -->
  <rect x="38" y="38" width="180" height="140" rx="0" fill="rgba(212,163,115,0.03)" stroke="#d4a373" stroke-width="2.5"/>

  <!-- Monitor inner screen -->
  <rect x="52" y="56" width="152" height="90" rx="0" fill="rgba(212,163,115,0.04)" stroke="rgba(212,163,115,0.2)" stroke-width="1"/>

  <!-- Terminal lines -->
  <line x1="64" y1="78" x2="140" y2="78" stroke="#d4a373" stroke-width="2" stroke-linecap="square"/>
  <line x1="64" y1="96" x2="190" y2="96" stroke="#d4a373" stroke-width="2" stroke-linecap="square" opacity="0.7"/>
  <line x1="64" y1="114" x2="170" y2="114" stroke="#d4a373" stroke-width="2" stroke-linecap="square" opacity="0.4"/>
  <line x1="64" y1="132" x2="120" y2="132" stroke="#d4a373" stroke-width="2" stroke-linecap="square" opacity="0.2"/>

  <!-- Prompt character -->
  <text x="64" y="78" fill="#d4a373" font-family="monospace" font-size="14" font-weight="bold">❯</text>

  <!-- Stand -->
  <rect x="98" y="178" width="60" height="6" rx="0" fill="rgba(212,163,115,0.3)" stroke="#d4a373" stroke-width="1.5"/>
  <rect x="118" y="184" width="20" height="18" rx="0" fill="rgba(212,163,115,0.2)" stroke="#d4a373" stroke-width="1.5"/>
  <rect x="86" y="202" width="84" height="8" rx="0" fill="rgba(212,163,115,0.15)" stroke="#d4a373" stroke-width="1.5"/>

  <!-- Title bar dots -->
  <circle cx="62" cy="46" r="4" fill="#e3567c"/>
  <circle cx="80" cy="46" r="4" fill="#d4a373"/>
  <circle cx="98" cy="46" r="4" fill="#4cc2a0"/>

  <!-- Grid overlay (multi-terminal hint) -->
  <rect x="52" y="56" width="75" height="43" rx="0" fill="none" stroke="rgba(212,163,115,0.06)" stroke-width="0.5"/>
  <rect x="127" y="56" width="77" height="43" rx="0" fill="none" stroke="rgba(212,163,115,0.06)" stroke-width="0.5"/>
  <rect x="52" y="99" width="75" height="47" rx="0" fill="none" stroke="rgba(212,163,115,0.06)" stroke-width="0.5"/>
  <rect x="127" y="99" width="77" height="47" rx="0" fill="none" stroke="rgba(212,163,115,0.06)" stroke-width="0.5"/>

  <!-- Outer glow -->
  <rect x="38" y="38" width="180" height="140" rx="0" fill="none" stroke="rgba(212,163,115,0.08)" stroke-width="0.5" stroke-dasharray="6 6"/>

  <!-- Pixel corner accents -->
  <rect x="38" y="38" width="8" height="8" fill="#d4a373" opacity="0.3"/>
  <rect x="210" y="38" width="8" height="8" fill="#d4a373" opacity="0.3"/>
  <rect x="38" y="170" width="8" height="8" fill="#d4a373" opacity="0.3"/>
  <rect x="210" y="170" width="8" height="8" fill="#d4a373" opacity="0.3"/>
</svg>
